services:
  app:
    image: ${APP_IMAGE:-nginx:alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-example-app}
    restart: unless-stopped

    ports:
      - "${APP_PORT:-8080}:80"

    environment:
      TZ: ${TZ:-America/Chicago}

    volumes:
      - ./data:/data

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - app-network

networks:
  app-network:
    name: ${COMPOSE_PROJECT_NAME:-example-app}-network
