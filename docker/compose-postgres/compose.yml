services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17}
    container_name: ${COMPOSE_PROJECT_NAME:-postgres}

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-America/Chicago}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - postgres-network

volumes:
  postgres-data:
    name: ${COMPOSE_PROJECT_NAME:-postgres}-data

networks:
  postgres-network:
    name: ${COMPOSE_PROJECT_NAME:-postgres}-network
